name: Ads / Monetization
description: Work related to ad inventory and placement
labels: ['ads', 'backlog']
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: e.g. Add first deterministic meme ad replacement
    validations:
      required: true
  - type: textarea
    id: goals
    attributes:
      label: Goals
      value: |
        - [ ] Maintain visual rhythm
        - [ ] Deterministic under same seed
        - [ ] Track impressions & clicks (stub)
  - type: textarea
    id: metrics
    attributes:
      label: Metrics / Tracking
      description: Note any metrics desired.
  - type: textarea
    id: notes
    attributes:
      label: Notes
