<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Generate Ad Images</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f0f0f0;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
      }

      h1 {
        color: #333;
      }

      .status {
        padding: 20px;
        background: #e3f2fd;
        border-radius: 4px;
        margin: 20px 0;
      }

      .success {
        background: #c8e6c9;
      }

      .error {
        background: #ffcdd2;
      }

      button {
        background: #4caf50;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin: 10px 5px;
      }

      button:hover {
        background: #45a049;
      }

      .download-link {
        display: inline-block;
        margin: 5px;
        padding: 8px 16px;
        background: #2196f3;
        color: white;
        text-decoration: none;
        border-radius: 4px;
      }

      .download-link:hover {
        background: #1976d2;
      }

      #downloads {
        margin-top: 20px;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .preview-item {
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 4px;
      }

      .preview-item img {
        width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🚀 Auto-Generate WakeUpNPC Ad Images</h1>

      <div class="status">
        <h3>This tool will automatically create and download all dummy ad images</h3>
        <p>Click the button below to generate 8 placeholder ad images (4 small, 4 large)</p>
      </div>

      <button onclick="generateAndDownloadAll()">Generate & Download All Ad Images</button>

      <div id="status-message"></div>
      <div id="downloads"></div>
      <div id="preview-grid" class="preview-grid"></div>
    </div>

    <script>
      const adSpecs = {
        small: {
          width: 400,
          height: 300,
          count: 4,
          bgColors: ['#6B7280', '#9CA3AF', '#6B7280', '#9CA3AF']
        },
        large: {
          width: 800,
          height: 400,
          count: 4,
          bgColors: ['#6B7280', '#9CA3AF', '#6B7280', '#9CA3AF']
        }
      }

      function drawAd (canvas, type, number, bgColor) {
        const ctx = canvas.getContext('2d')
        const width = canvas.width
        const height = canvas.height

        // Fill background
        ctx.fillStyle = bgColor
        ctx.fillRect(0, 0, width, height)

        // Add border
        ctx.strokeStyle = '#4B5563'
        ctx.lineWidth = 2
        ctx.strokeRect(1, 1, width - 2, height - 2)

        // Add diagonal lines for placeholder effect
        ctx.strokeStyle = '#374151'
        ctx.lineWidth = 1
        ctx.beginPath()
        ctx.moveTo(0, 0)
        ctx.lineTo(width, height)
        ctx.moveTo(width, 0)
        ctx.lineTo(0, height)
        ctx.stroke()

        // Add center text
        ctx.fillStyle = '#FFFFFF'
        ctx.font = 'bold 48px Arial'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'

        const mainText = `${type.toUpperCase()} AD ${number}`
        ctx.fillText(mainText, width / 2, height / 2 - 30)

        // Add dimensions text
        ctx.font = '24px Arial'
        ctx.fillStyle = '#E5E7EB'
        ctx.fillText(`${width} × ${height}px`, width / 2, height / 2 + 20)

        // Add "PLACEHOLDER" text
        ctx.font = '16px Arial'
        ctx.fillStyle = '#9CA3AF'
        ctx.fillText('PLACEHOLDER', width / 2, height / 2 + 50)

        // Add corner markers
        const markerSize = 20
        ctx.strokeStyle = '#FFFFFF'
        ctx.lineWidth = 2

        // Top-left
        ctx.beginPath()
        ctx.moveTo(10, 10 + markerSize)
        ctx.lineTo(10, 10)
        ctx.lineTo(10 + markerSize, 10)
        ctx.stroke()

        // Top-right
        ctx.beginPath()
        ctx.moveTo(width - 10 - markerSize, 10)
        ctx.lineTo(width - 10, 10)
        ctx.lineTo(width - 10, 10 + markerSize)
        ctx.stroke()

        // Bottom-left
        ctx.beginPath()
        ctx.moveTo(10, height - 10 - markerSize)
        ctx.lineTo(10, height - 10)
        ctx.lineTo(10 + markerSize, height - 10)
        ctx.stroke()

        // Bottom-right
        ctx.beginPath()
        ctx.moveTo(width - 10 - markerSize, height - 10)
        ctx.lineTo(width - 10, height - 10)
        ctx.lineTo(width - 10, height - 10 - markerSize)
        ctx.stroke()
      }

      function downloadCanvas (canvas, filename) {
        canvas.toBlob(function(blob) {
          const url = URL.createObjectURL(blob)
          const a = document.createElement('a')
          a.href = url
          a.download = filename
          document.body.appendChild(a)
          a.click()
          document.body.removeChild(a)
          URL.revokeObjectURL(url)
        }, 'image/jpeg', 0.9)
      }

      async function generateAndDownloadAll () {
        const statusDiv = document.getElementById('status-message')
        const downloadsDiv = document.getElementById('downloads')
        const previewGrid = document.getElementById('preview-grid')

        statusDiv.innerHTML = '<div class="status">⏳ Generating images...</div>'
        downloadsDiv.innerHTML = ''
        previewGrid.innerHTML = ''

        const allAds = []

        // Generate small ads
        for (let i = 1; i <= adSpecs.small.count; i++) {
          const canvas = document.createElement('canvas')
          canvas.width = adSpecs.small.width
          canvas.height = adSpecs.small.height
          drawAd(canvas, 'Small', i, adSpecs.small.bgColors[i - 1])

          const filename = `ad-small-${i}.jpg`
          allAds.push({ canvas, filename, type: 'small' })
        }

        // Generate large ads
        for (let i = 1; i <= adSpecs.large.count; i++) {
          const canvas = document.createElement('canvas')
          canvas.width = adSpecs.large.width
          canvas.height = adSpecs.large.height
          drawAd(canvas, 'Large', i, adSpecs.large.bgColors[i - 1])

          const filename = `ad-large-${i}.jpg`
          allAds.push({ canvas, filename, type: 'large' })
        }

        // Create download links and previews
        statusDiv.innerHTML = '<div class="status success">✅ Images generated successfully!</div>'

        const instructions = document.createElement('div')
        instructions.innerHTML = `
                <h3>Download Instructions:</h3>
                <ol>
                    <li>Click each download link below (or they may auto-download)</li>
                    <li>Save all files to: <code>content/ads/</code></li>
                    <li>Keep the suggested filenames (ad-small-1.jpg, ad-large-1.jpg, etc.)</li>
                </ol>
            `
        downloadsDiv.appendChild(instructions)

        const linksContainer = document.createElement('div')
        linksContainer.innerHTML = '<h4>Download Links:</h4>'

        // Add previews and trigger downloads
        for (const ad of allAds) {
          // Create preview
          const previewItem = document.createElement('div')
          previewItem.className = 'preview-item'

          const img = document.createElement('img')
          img.src = ad.canvas.toDataURL('image/jpeg', 0.9)
          img.alt = ad.filename

          const label = document.createElement('p')
          label.innerHTML = `<strong>${ad.filename}</strong>`

          previewItem.appendChild(label)
          previewItem.appendChild(img)
          previewGrid.appendChild(previewItem)

          // Create download link
          ad.canvas.toBlob(function(blob) {
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download = ad.filename
            a.className = 'download-link'
            a.textContent = `Download ${ad.filename}`
            linksContainer.appendChild(a)
          }, 'image/jpeg', 0.9)

          // Auto-download with delay
          setTimeout(() => {
            downloadCanvas(ad.canvas, ad.filename)
          }, 500 * allAds.indexOf(ad))
        }

        downloadsDiv.appendChild(linksContainer)
      }
    </script>
  </body>

</html>
