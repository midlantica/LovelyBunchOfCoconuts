# cspell:disable
# netlify.toml

[build]
# Rebuild native better-sqlite3 binding explicitly before Nuxt generate to avoid missing binary in Netlify's build environment.
# After generation, copy the static assets from .output/public to dist (Netlify publish dir) for resilience.
# This avoids deploy-stage failures if Nuxt changes the output folder naming or generation aborts early.
command = "pnpm rebuild better-sqlite3 || echo 'better-sqlite3 rebuild failed (continuing)'; pnpm run build && (mkdir -p dist && if [ -d .output/public ]; then cp -R .output/public/* dist/; fi)"
publish = "dist"

[build.environment]
NODE_VERSION = "20.18.0"
PNPM_FLAGS = "--shamefully-hoist"

# Force non-www canonical domain
[[redirects]]
from = "https://www.wakeupnpc.com/*"
to = "https://wakeupnpc.com/:splat"
status = 301
force = true

# SPA fallback in dev/prod hosting (keep last)
[[redirects]]
from = "/*"
to = "/"
status = 200

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
X-Frame-Options = "SAMEORIGIN"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
# Start with a relaxed CSP; tighten later
Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://gc.zgo.at; connect-src 'self' https: https://wakeupnpc.goatcounter.com https://gc.zgo.at; font-src 'self' data:;"