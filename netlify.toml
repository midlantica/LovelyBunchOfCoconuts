# cspell:disable
# netlify.toml

[build]
# Use Nitro Netlify preset (auto-detected). This builds SSR with Functions.
command = "pnpm install --no-optional=false && pnpm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "22.11.0"
PNPM_FLAGS = "--shamefully-hoist --no-optional=false"

# Pro Plan: Build plugins removed - using built-in optimizations instead

# Pro Plan: Advanced caching configuration
[build.processing]
skip_processing = false

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.html]
pretty_urls = true

[build.processing.images]
compress = true

# Force non-www canonical domain
[[redirects]]
from = "https://www.wakeupnpc.com/*"
to = "https://wakeupnpc.com/:splat"
status = 301
force = true

# Pro Plan: Enhanced caching headers for static assets
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/memes/*"
[headers.values]
Cache-Control = "public, max-age=86400"

# Security headers with Pro Plan optimizations
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
X-Frame-Options = "SAMEORIGIN"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
# Enhanced CSP for Pro Plan
Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://gc.zgo.at; connect-src 'self' https: https://wakeupnpc.goatcounter.com https://gc.zgo.at; font-src 'self' data: https://fonts.gstatic.com;"
