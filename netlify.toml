# cspell:disable
# netlify.toml

[build]
command = "pnpm run build"
## Nuxt 4 static generation (`nuxt generate`) outputs to `dist/`.
## `.output/public` would exist only when doing an SSR/server build (`nuxt build`).
## Since our build script runs `nuxt generate`, publish the `dist` folder.
publish = "dist"

[build.environment]
NODE_VERSION = "20.18.0"
PNPM_FLAGS = "--shamefully-hoist"

# Force non-www canonical domain
[[redirects]]
from = "https://www.wakeupnpc.com/*"
to = "https://wakeupnpc.com/:splat"
status = 301
force = true

# SPA fallback in dev/prod hosting (keep last)
[[redirects]]
from = "/*"
to = "/"
status = 200

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
X-Frame-Options = "SAMEORIGIN"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
# Start with a relaxed CSP; tighten later
Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://gc.zgo.at; connect-src 'self' https: https://wakeupnpc.goatcounter.com https://gc.zgo.at; font-src 'self' data:;"