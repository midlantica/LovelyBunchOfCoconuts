<!doctype html>
<html {{ HTML_ATTRS }}>
  <head {{ HEAD_ATTRS }}>
    {{ HEAD }}
    <script>
      ;(function () {
        var allowedHosts = ['www.wakeupnpc.com']
        var isDev =
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1'
        var isAllowedHost =
          isDev || allowedHosts.includes(window.location.hostname)
        var isRoot =
          window.location.pathname === '/' &&
          !window.location.search &&
          !window.location.hash
        if (!isAllowedHost) {
          window.location.replace(
            window.location.protocol + '//' + 'www.wakeupnpc.com/'
          )
        } else if (!isRoot) {
          window.location.replace(window.location.origin + '/')
        }
      })()
    </script>
  </head>
  <body {{ BODY_ATTRS }}>
    {{ APP }}
  </body>
</html>
